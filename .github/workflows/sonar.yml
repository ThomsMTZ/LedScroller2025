name: SonarQube Analysis
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # SonarCloud a besoin de l'historique complet pour le 'blame'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci # ou yarn install

      - name: Run Jest Tests & Coverage
        run: npx jest --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Fourni automatiquement
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # À configurer dans les secrets de ton repo
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
